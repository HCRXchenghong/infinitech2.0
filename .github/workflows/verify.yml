name: Infinitech Verification

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify monorepo
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: services/api-go/go.mod
          cache-dependency-path: services/api-go/go.sum

      - name: Install npm workspace dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install --workspaces --include-workspace-root --ignore-scripts
          fi

      - name: Show tool versions
        run: |
          node --version
          npm --version
          go version

      - name: Run platform verification
        run: npm run verify

      - name: Run uncached Go verification
        run: cd services/api-go && go test -count=1 ./...
