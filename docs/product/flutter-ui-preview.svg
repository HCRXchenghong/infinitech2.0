<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="980" viewBox="0 0 1440 980">
  <defs>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#009bf5"/>
      <stop offset="1" stop-color="#0081cc"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#0f172a" flood-opacity="0.16"/>
    </filter>
    <symbol id="logo" viewBox="0 0 128 128">
      <circle cx="64" cy="56" r="28" fill="url(#brand)" opacity="0.14"/>
      <path d="M40 70c2 14 14 24 24 24s22-10 24-24" fill="none" stroke="#009bf5" stroke-width="6" stroke-linecap="round"/>
      <path d="M38 64c8 6 18 9 26 9s18-3 26-9" fill="none" stroke="#0088d9" stroke-width="6" stroke-linecap="round" opacity="0.9"/>
      <path d="M86 32l10-6" stroke="#009bf5" stroke-width="6" stroke-linecap="round"/>
      <path d="M92 44l12-4" stroke="#009bf5" stroke-width="6" stroke-linecap="round" opacity="0.85"/>
      <circle cx="52" cy="52" r="3.5" fill="#009bf5" opacity="0.9"/>
      <circle cx="76" cy="52" r="3.5" fill="#009bf5" opacity="0.9"/>
    </symbol>
    <style>
      .bg { fill: #eef6fb; }
      .phone { fill: #f8fafc; stroke: #dbeafe; stroke-width: 2; filter: url(#shadow); }
      .status { fill: #111827; font: 700 12px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .screen-title { fill: #111827; font: 800 24px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .brand-title { fill: #009bf5; font: 800 34px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .section { fill: #111827; font: 800 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .text { fill: #374151; font: 600 16px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .muted { fill: #6b7280; font: 500 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .small { fill: #64748b; font: 600 12px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .white { fill: #ffffff; font: 800 15px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .card { fill: #ffffff; stroke: #e5e7eb; stroke-width: 1.5; }
      .panel { fill: #f1f5f9; }
      .brand-card { fill: url(#brand); }
      .accent { fill: #009bf5; }
      .accent-soft { fill: #e0f2fe; }
      .success { fill: #dcfce7; }
      .success-text { fill: #166534; font: 800 12px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .warn { fill: #fef3c7; }
      .warn-text { fill: #92400e; font: 800 12px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .danger { fill: #fee2e2; }
      .danger-text { fill: #991b1b; font: 800 12px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .pill-text { fill: #007ccc; font: 800 12px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .button { fill: #009bf5; }
      .button-text { fill: #ffffff; font: 800 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .darkbar { fill: #111827; }
      .line { stroke: #e5e7eb; stroke-width: 1.5; }
      .bar { fill: #bae6fd; }
      .bar-strong { fill: #009bf5; }
