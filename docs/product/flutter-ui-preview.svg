    <text x="48" y="406" class="muted">望京SOHO · 预计 32 分钟送达</text>
    <rect class="button" x="230" y="368" width="78" height="38" rx="14"/>
    <text x="244" y="392" class="button-text">接单</text>

    <rect class="card" x="28" y="450" width="142" height="100" rx="20"/>
    <text x="48" y="484" class="muted">备餐中</text>
    <text x="48" y="524" class="screen-title">12</text>
    <rect class="card" x="190" y="450" width="142" height="100" rx="20"/>
    <text x="210" y="484" class="muted">待骑手</text>
    <text x="210" y="524" class="screen-title">7</text>

    <text x="28" y="590" class="section">高频入口</text>
    <rect class="accent-soft" x="28" y="610" width="88" height="58" rx="18"/>
    <text x="50" y="645" class="pill-text">商品</text>
    <rect class="accent-soft" x="136" y="610" width="88" height="58" rx="18"/>
    <text x="158" y="645" class="pill-text">团购</text>
    <rect class="accent-soft" x="244" y="610" width="88" height="58" rx="18"/>
    <text x="260" y="645" class="pill-text">通知</text>
  </g>

  <g transform="translate(540 160)">
