    <text x="50" y="662" class="text">42 秒 · A 级优先派单</text>
    <rect class="bar" x="204" y="638" width="88" height="10" rx="5"/>
    <rect class="bar-strong" x="204" y="638" width="64" height="10" rx="5"/>
  </g>

  <g transform="translate(998 160)">
    <rect class="phone" x="0" y="0" width="360" height="720" rx="36"/>
