    <rect class="warn" x="48" y="426" width="66" height="28" rx="14"/>
    <text x="62" y="445" class="warn-text">调度</text>
    <text x="128" y="434" class="text">3 单超过派单阈值</text>
    <text x="128" y="462" class="muted">建议查看站点骑手在线状态</text>

    <text x="28" y="536" class="section">操作入口</text>
    <rect class="accent-soft" x="28" y="556" width="142" height="58" rx="18"/>
    <text x="54" y="591" class="pill-text">订单监控</text>
    <rect class="accent-soft" x="190" y="556" width="142" height="58" rx="18"/>
    <text x="216" y="591" class="pill-text">骑手调度</text>
    <rect class="accent-soft" x="28" y="632" width="142" height="58" rx="18"/>
    <text x="54" y="667" class="pill-text">通知告警</text>
    <rect class="accent-soft" x="190" y="632" width="142" height="58" rx="18"/>
    <text x="216" y="667" class="pill-text">审计追踪</text>
  </g>
</svg>
