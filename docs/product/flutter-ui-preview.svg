    <rect class="card" x="28" y="288" width="304" height="172" rx="22"/>
    <rect class="accent-soft" x="48" y="312" width="64" height="64" rx="18"/>
    <text x="62" y="350" class="pill-text">取</text>
    <text x="128" y="326" class="text">蓝海餐厅</text>
    <text x="128" y="352" class="muted">取餐剩余 08:32</text>
    <line class="line" x1="80" y1="382" x2="80" y2="420"/>
