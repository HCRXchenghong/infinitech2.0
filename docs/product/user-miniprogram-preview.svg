<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="980" viewBox="0 0 1440 980">
  <defs>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#009bf5"/>
      <stop offset="1" stop-color="#0081cc"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#0f172a" flood-opacity="0.16"/>
    </filter>
    <symbol id="logo" viewBox="0 0 128 128">
      <circle cx="64" cy="56" r="28" fill="url(#brand)" opacity="0.14"/>
      <path d="M40 70c2 14 14 24 24 24s22-10 24-24" fill="none" stroke="#009bf5" stroke-width="6" stroke-linecap="round"/>
      <path d="M38 64c8 6 18 9 26 9s18-3 26-9" fill="none" stroke="#0088d9" stroke-width="6" stroke-linecap="round" opacity="0.9"/>
      <path d="M86 32l10-6" stroke="#009bf5" stroke-width="6" stroke-linecap="round"/>
      <path d="M92 44l12-4" stroke="#009bf5" stroke-width="6" stroke-linecap="round" opacity="0.85"/>
      <circle cx="52" cy="52" r="3.5" fill="#009bf5" opacity="0.9"/>
      <circle cx="76" cy="52" r="3.5" fill="#009bf5" opacity="0.9"/>
    </symbol>
    <style>
      .bg { fill: #eef6fb; }
      .phone { fill: #f3f4f6; stroke: #dbeafe; stroke-width: 2; filter: url(#shadow); }
      .screen-title { fill: #111827; font: 700 22px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .brand-title { fill: #009bf5; font: 800 34px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .text { fill: #374151; font: 500 16px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .muted { fill: #6b7280; font: 400 14px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .card { fill: #ffffff; stroke: #e5e7eb; stroke-width: 1.5; }
      .pill { fill: #e0f2fe; }
      .pill-active { fill: #009bf5; }
      .pill-text { fill: #007ccc; font: 700 14px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .pill-active-text { fill: #ffffff; font: 700 14px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .price { fill: #009bf5; font: 800 19px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .button { fill: #009bf5; }
      .button-text { fill: #ffffff; font: 700 15px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .darkbar { fill: #111827; }
      .white { fill: #ffffff; font: 700 16px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .line { stroke: #e5e7eb; stroke-width: 1.5; }
    </style>
  </defs>

  <rect class="bg" width="1440" height="980"/>
  <text x="72" y="78" class="brand-title">Infinitech 2.0 用户端小程序预览</text>
  <text x="72" y="112" class="muted">外卖下单闭环首批页面：浅蓝主题、旧版 logo、商家列表、店铺详情、购物车、确认订单。</text>

  <g transform="translate(70 160)">
    <rect class="phone" x="0" y="0" width="300" height="680" rx="34"/>
    <text x="24" y="52" class="screen-title">首页</text>
    <use href="#logo" x="24" y="76" width="58" height="58"/>
    <text x="24" y="168" class="brand-title">Infinitech</text>
    <text x="24" y="198" class="muted">外卖 · 团购 · 买药 · 快递跑腿 · 圈子</text>
    <rect class="button" x="24" y="230" width="118" height="76" rx="14"/>
    <text x="58" y="276" class="button-text">外卖</text>
    <rect class="button" x="158" y="230" width="118" height="76" rx="14"/>
    <text x="192" y="276" class="button-text">团购</text>
    <rect class="card" x="24" y="324" width="252" height="76" rx="14"/>
    <text x="44" y="354" class="text">买药</text>
    <text x="44" y="380" class="muted">药房/医务室资质控制</text>
    <rect class="card" x="24" y="416" width="252" height="76" rx="14"/>
    <text x="44" y="446" class="text">快递跑腿</text>
    <text x="44" y="472" class="muted">接入骑手履约流程</text>
    <rect class="card" x="24" y="514" width="252" height="98" rx="14"/>
    <text x="44" y="546" class="text">圈子小微墙</text>
    <text x="44" y="574" class="muted">发动态，找饭搭，附近活动</text>
  </g>

  <g transform="translate(405 160)">
    <rect class="phone" x="0" y="0" width="300" height="680" rx="34"/>
    <text x="24" y="52" class="screen-title">附近商家</text>
    <rect class="card" x="24" y="78" width="252" height="50" rx="12"/>
    <text x="44" y="109" class="muted">搜索商家、菜品、团购券</text>
    <rect class="pill-active" x="24" y="154" width="58" height="34" rx="17"/>
    <text x="39" y="176" class="pill-active-text">外卖</text>
    <rect class="pill" x="92" y="154" width="58" height="34" rx="17"/>
    <text x="107" y="176" class="pill-text">团购</text>
    <rect class="pill" x="160" y="154" width="58" height="34" rx="17"/>
    <text x="175" y="176" class="pill-text">买药</text>
    <rect class="pill" x="228" y="154" width="48" height="34" rx="17"/>
    <text x="238" y="176" class="pill-text">跑腿</text>
    <rect class="card" x="24" y="216" width="252" height="210" rx="16"/>
    <use href="#logo" x="42" y="236" width="62" height="62"/>
    <text x="118" y="246" class="text">蓝海餐厅</text>
    <text x="236" y="246" class="muted">1.8km</text>
    <text x="118" y="274" class="muted">简餐 · 团购 · 4.8 分</text>
    <text x="118" y="300" class="muted">约 32 分钟 · 配送 ¥3</text>
    <rect class="pill" x="118" y="322" width="46" height="26" rx="8"/>
    <text x="128" y="340" class="pill-text">外卖</text>
    <rect class="pill" x="172" y="322" width="46" height="26" rx="8"/>
    <text x="182" y="340" class="pill-text">团购</text>
    <text x="42" y="386" class="muted">招牌牛肉饭热卖，到店套餐扫码验券。</text>
    <rect class="card" x="24" y="450" width="252" height="92" rx="16"/>
    <text x="44" y="482" class="text">后台推荐商家位</text>
    <text x="44" y="510" class="muted">排序、开关、灰度都由后台控制</text>
  </g>

  <g transform="translate(740 160)">
    <rect class="phone" x="0" y="0" width="300" height="680" rx="34"/>
    <text x="24" y="52" class="screen-title">店铺详情</text>
    <rect class="card" x="24" y="78" width="252" height="116" rx="16"/>
    <use href="#logo" x="44" y="102" width="64" height="64"/>
    <text x="122" y="112" class="text">蓝海餐厅</text>
    <text x="122" y="140" class="muted">4.8 分 · 约 32 分钟送达</text>
    <text x="122" y="166" class="muted">资质已审核，团购扫码核销</text>
    <text x="24" y="232" class="screen-title">外卖商品</text>
    <rect class="card" x="24" y="252" width="252" height="122" rx="16"/>
    <rect x="44" y="274" width="72" height="72" rx="14" fill="#e0f2fe"/>
    <text x="132" y="282" class="text">招牌牛肉饭</text>
    <text x="132" y="309" class="muted">牛肉、米饭、时蔬</text>
    <text x="132" y="342" class="price">¥25.99</text>
    <rect class="button" x="222" y="318" width="38" height="30" rx="9"/>
    <text x="230" y="338" class="button-text">加</text>
    <text x="24" y="414" class="screen-title">团购券</text>
    <rect class="card" x="24" y="434" width="252" height="104" rx="16"/>
    <text x="44" y="464" class="text">双人到店套餐券</text>
    <text x="44" y="492" class="muted">生成二维码，商户端扫码验券</text>
    <text x="44" y="524" class="price">¥39.90</text>
    <rect class="darkbar" x="24" y="584" width="252" height="66" rx="16"/>
    <text x="44" y="614" class="white">已选 1 件</text>
    <rect class="button" x="198" y="600" width="58" height="34" rx="10"/>
    <text x="207" y="622" class="button-text">结算</text>
  </g>

  <g transform="translate(1075 160)">
    <rect class="phone" x="0" y="0" width="300" height="680" rx="34"/>
    <text x="24" y="52" class="screen-title">确认订单</text>
    <rect class="card" x="24" y="78" width="252" height="110" rx="16"/>
    <text x="44" y="110" class="muted">配送地址</text>
    <text x="44" y="142" class="text">北京 望京SOHO</text>
    <text x="44" y="168" class="muted">张三 13800000000</text>
    <rect class="card" x="24" y="214" width="252" height="126" rx="16"/>
    <text x="44" y="248" class="text">蓝海餐厅</text>
    <line class="line" x1="44" y1="270" x2="256" y2="270"/>
    <text x="44" y="302" class="muted">招牌牛肉饭 x 2</text>
    <text x="202" y="302" class="text">¥51.98</text>
    <rect class="card" x="24" y="364" width="252" height="146" rx="16"/>
    <text x="44" y="398" class="muted">餐具数量</text>
    <text x="216" y="398" class="text">2 份</text>
    <text x="44" y="434" class="muted">订单备注</text>
    <text x="202" y="434" class="text">少放辣</text>
    <text x="44" y="470" class="muted">支付方式</text>
    <text x="146" y="470" class="text">微信 / 余额</text>
    <rect class="darkbar" x="24" y="584" width="252" height="66" rx="16"/>
    <text x="44" y="624" class="white">¥55.98</text>
    <rect class="button" x="180" y="600" width="76" height="34" rx="10"/>
    <text x="190" y="622" class="button-text">提交</text>
  </g>
</svg>
