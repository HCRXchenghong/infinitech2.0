services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: infinitech
      POSTGRES_USER: infinitech
      POSTGRES_PASSWORD: infinitech_dev_only
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U infinitech -d infinitech"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"

  kafka:
    image: bitnami/kafka:3.7
    environment:
      KAFKA_CFG_NODE_ID: 1
      KAFKA_CFG_PROCESS_ROLES: broker,controller
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://127.0.0.1:9092
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      ALLOW_PLAINTEXT_LISTENER: "yes"
    ports:
      - "9092:9092"

  outbox-relay-worker:
    image: infinitech/outbox-relay-worker:0.1.0
    profiles: ["workers"]
    environment:
      API_BASE_URL: ${API_BASE_URL:-http://host.docker.internal:1029}
      OUTBOX_RELAY_TOKEN: ${OUTBOX_RELAY_TOKEN:-}
      OUTBOX_RELAY_INTERVAL_MS: "5000"
      OUTBOX_RELAY_BATCH_LIMIT: "100"
      OUTBOX_RELAY_RETRY_AFTER_SECONDS: "60"
      OUTBOX_RELAY_MAX_ATTEMPTS: "10"
      OUTBOX_RELAY_WORKER_ID: ${OUTBOX_RELAY_WORKER_ID:-local-outbox-relay}
      OUTBOX_RELAY_LEASE_SECONDS: "60"
      OUTBOX_RELAY_LEASE_RENEW_INTERVAL_MS: "30000"
      OUTBOX_RELAY_TOPICS: order.paid,order.status_changed,order.completed,dispatch.assigned,dispatch.timeout,dispatch.status_changed,audit.retention_alerts
    depends_on:
      - kafka

  audit-archive-worker:
    image: infinitech/audit-archive-worker:0.1.0
    profiles: ["workers"]
    environment:
      API_BASE_URL: ${API_BASE_URL:-http://host.docker.internal:1029}
      AUDIT_ARCHIVE_WORKER_TOKEN: ${AUDIT_ARCHIVE_WORKER_TOKEN:-}
      AUDIT_ARCHIVE_UPLOAD_BASE_URL: ${AUDIT_ARCHIVE_UPLOAD_BASE_URL:-http://minio:9000}
      AUDIT_ARCHIVE_UPLOAD_TOKEN: ${AUDIT_ARCHIVE_UPLOAD_TOKEN:-}
      AUDIT_ARCHIVE_INTERVAL_MS: ${AUDIT_ARCHIVE_INTERVAL_MS:-30000}
      AUDIT_ARCHIVE_BATCH_LIMIT: ${AUDIT_ARCHIVE_BATCH_LIMIT:-20}
      AUDIT_ARCHIVE_RETRY_AFTER_SECONDS: ${AUDIT_ARCHIVE_RETRY_AFTER_SECONDS:-300}
      AUDIT_ARCHIVE_MAX_ATTEMPTS: ${AUDIT_ARCHIVE_MAX_ATTEMPTS:-10}
      AUDIT_ARCHIVE_WORKER_ID: ${AUDIT_ARCHIVE_WORKER_ID:-local-audit-archive}
      AUDIT_ARCHIVE_LEASE_SECONDS: ${AUDIT_ARCHIVE_LEASE_SECONDS:-300}
      AUDIT_ARCHIVE_OBJECT_LOCK_MODE: ${AUDIT_ARCHIVE_OBJECT_LOCK_MODE:-COMPLIANCE}
      AUDIT_ARCHIVE_RETENTION_DAYS: ${AUDIT_ARCHIVE_RETENTION_DAYS:-2555}
    depends_on:
      - minio

  object-scan-worker:
    image: infinitech/object-scan-worker:0.1.0
    profiles: ["workers"]
    environment:
      API_BASE_URL: ${API_BASE_URL:-http://host.docker.internal:1029}
      OBJECT_SCAN_WORKER_TOKEN: ${OBJECT_SCAN_WORKER_TOKEN:-}
      OBJECT_STORAGE_CALLBACK_SIGNING_SECRET: ${OBJECT_STORAGE_CALLBACK_SIGNING_SECRET:-}
      OBJECT_STORAGE_DOWNLOAD_BASE_URL: ${OBJECT_STORAGE_DOWNLOAD_BASE_URL:-http://minio:9000}
      OBJECT_SCAN_TOPICS: object.uploaded,after_sales.evidence.object_uploaded
      OBJECT_SCAN_SCANNER: ${OBJECT_SCAN_SCANNER:-clamav}
      OBJECT_SCAN_MAX_BYTES: ${OBJECT_SCAN_MAX_BYTES:-10485760}
      OBJECT_SCAN_DOWNLOAD_TIMEOUT_MS: ${OBJECT_SCAN_DOWNLOAD_TIMEOUT_MS:-15000}
      OBJECT_SCAN_CLAMAV_TIMEOUT_MS: ${OBJECT_SCAN_CLAMAV_TIMEOUT_MS:-15000}
      OBJECT_SCAN_CLAMAV_CHUNK_BYTES: ${OBJECT_SCAN_CLAMAV_CHUNK_BYTES:-65536}
      CLAMAV_HOST: ${CLAMAV_HOST:-clamav}
      CLAMAV_PORT: ${CLAMAV_PORT:-3310}
    depends_on:
      - kafka
      - minio
      - clamav

  object-lifecycle-worker:
    image: infinitech/object-lifecycle-worker:0.1.0
    profiles: ["workers"]
    environment:
      API_BASE_URL: ${API_BASE_URL:-http://host.docker.internal:1029}
      OBJECT_LIFECYCLE_WORKER_TOKEN: ${OBJECT_LIFECYCLE_WORKER_TOKEN:-}
      OBJECT_STORAGE_DELETE_BASE_URL: ${OBJECT_STORAGE_DELETE_BASE_URL:-http://minio:9000}
      OBJECT_STORAGE_DELETE_TOKEN: ${OBJECT_STORAGE_DELETE_TOKEN:-}
      OBJECT_LIFECYCLE_INTERVAL_MS: ${OBJECT_LIFECYCLE_INTERVAL_MS:-60000}
      OBJECT_LIFECYCLE_BATCH_LIMIT: ${OBJECT_LIFECYCLE_BATCH_LIMIT:-100}
      OBJECT_LIFECYCLE_GRACE_SECONDS: ${OBJECT_LIFECYCLE_GRACE_SECONDS:-3600}
    depends_on:
      - minio

  clamav:
    image: clamav/clamav:stable
    profiles: ["workers"]
    ports:
      - "3310:3310"

  minio:
    image: quay.io/minio/minio:latest
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: infinitech
      MINIO_ROOT_PASSWORD: infinitech_dev_only
    ports:
      - "9000:9000"
      - "9001:9001"

  vault:
    image: hashicorp/vault:1.16
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: infinitech-dev-token
    ports:
      - "8200:8200"
