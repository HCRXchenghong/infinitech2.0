apiVersion: apps/v1
kind: Deployment
metadata:
  name: outbox-relay-worker
  namespace: infinitech
spec:
  replicas: 2
  selector:
    matchLabels:
      app: outbox-relay-worker
  template:
    metadata:
      labels:
        app: outbox-relay-worker
    spec:
      containers:
        - name: outbox-relay-worker
          image: infinitech/outbox-relay-worker:0.1.0
          env:
            - name: API_BASE_URL
              value: http://api-go:1029
            - name: KAFKA_REST_URL
              value: http://kafka-rest:8082
            - name: OUTBOX_RELAY_TOPICS
              value: order.paid,order.status_changed,order.completed,dispatch.assigned,dispatch.timeout,dispatch.status_changed
            - name: OUTBOX_RELAY_INTERVAL_MS
              value: "5000"
            - name: OUTBOX_RELAY_BATCH_LIMIT
              value: "100"
            - name: OUTBOX_RELAY_RETRY_AFTER_SECONDS
              value: "60"
            - name: OUTBOX_RELAY_MAX_ATTEMPTS
              value: "10"
            - name: OUTBOX_RELAY_WORKER_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: OUTBOX_RELAY_LEASE_SECONDS
              value: "60"
            - name: OUTBOX_RELAY_LEASE_RENEW_INTERVAL_MS
              value: "30000"
            - name: OUTBOX_RELAY_TOKEN
              valueFrom:
                secretKeyRef:
                  name: infinitech-secrets
                  key: outbox-relay-token
                  optional: true
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: object-scan-worker
  namespace: infinitech
spec:
  replicas: 2
  selector:
    matchLabels:
      app: object-scan-worker
  template:
    metadata:
      labels:
        app: object-scan-worker
    spec:
      containers:
        - name: object-scan-worker
          image: infinitech/object-scan-worker:0.1.0
          env:
            - name: API_BASE_URL
              value: http://api-go:1029
            - name: OBJECT_SCAN_TOPICS
              value: object.uploaded,after_sales.evidence.object_uploaded
            - name: OBJECT_SCAN_SCANNER
              value: clamav
            - name: OBJECT_STORAGE_DOWNLOAD_BASE_URL
              value: http://minio:9000
            - name: OBJECT_SCAN_MAX_BYTES
              value: "10485760"
            - name: OBJECT_SCAN_DOWNLOAD_TIMEOUT_MS
              value: "15000"
            - name: OBJECT_SCAN_CLAMAV_TIMEOUT_MS
              value: "15000"
            - name: OBJECT_SCAN_CLAMAV_CHUNK_BYTES
              value: "65536"
            - name: CLAMAV_HOST
              value: clamav
            - name: CLAMAV_PORT
              value: "3310"
            - name: OBJECT_SCAN_WORKER_TOKEN
              valueFrom:
                secretKeyRef:
                  name: infinitech-secrets
                  key: object-scan-worker-token
                  optional: true
            - name: OBJECT_STORAGE_CALLBACK_SIGNING_SECRET
              valueFrom:
                secretKeyRef:
                  name: infinitech-secrets
                  key: object-storage-callback-signing-secret
                  optional: true
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: object-lifecycle-worker
  namespace: infinitech
spec:
  replicas: 1
  selector:
    matchLabels:
      app: object-lifecycle-worker
  template:
    metadata:
      labels:
        app: object-lifecycle-worker
    spec:
      containers:
        - name: object-lifecycle-worker
          image: infinitech/object-lifecycle-worker:0.1.0
          env:
            - name: API_BASE_URL
              value: http://api-go:1029
            - name: OBJECT_STORAGE_DELETE_BASE_URL
              value: http://minio:9000
            - name: OBJECT_LIFECYCLE_INTERVAL_MS
              value: "60000"
            - name: OBJECT_LIFECYCLE_BATCH_LIMIT
              value: "100"
            - name: OBJECT_LIFECYCLE_GRACE_SECONDS
              value: "3600"
            - name: OBJECT_LIFECYCLE_WORKER_TOKEN
              valueFrom:
                secretKeyRef:
                  name: infinitech-secrets
                  key: object-lifecycle-worker-token
                  optional: true
            - name: OBJECT_STORAGE_DELETE_TOKEN
              valueFrom:
                secretKeyRef:
                  name: infinitech-secrets
                  key: object-storage-delete-token
                  optional: true
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: clamav
  namespace: infinitech
spec:
  replicas: 2
  selector:
    matchLabels:
      app: clamav
  template:
    metadata:
      labels:
        app: clamav
    spec:
      containers:
        - name: clamav
          image: clamav/clamav:stable
          ports:
            - containerPort: 3310
          readinessProbe:
            tcpSocket:
              port: 3310
          livenessProbe:
            tcpSocket:
              port: 3310
---
apiVersion: v1
kind: Service
metadata:
  name: clamav
  namespace: infinitech
spec:
  selector:
    app: clamav
  ports:
    - port: 3310
      targetPort: 3310
