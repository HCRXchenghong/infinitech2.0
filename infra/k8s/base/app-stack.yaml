apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-go
  namespace: infinitech
spec:
  replicas: 3
  selector:
    matchLabels:
      app: api-go
  template:
    metadata:
      labels:
        app: api-go
    spec:
      containers:
        - name: api-go
          image: infinitech/api-go:0.1.0
          ports:
            - containerPort: 1029
          readinessProbe:
            httpGet:
              path: /readyz
              port: 1029
          livenessProbe:
            httpGet:
              path: /healthz
              port: 1029
---
apiVersion: v1
kind: Service
metadata:
  name: api-go
  namespace: infinitech
spec:
  selector:
    app: api-go
  ports:
    - port: 1029
      targetPort: 1029
---
